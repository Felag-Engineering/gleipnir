version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries"
    schema:
      - "internal/db/migrations/0001_initial.sql"
      - "internal/db/migrations/0002_add_manual_trigger.sql"
      - "internal/db/migrations/0003_add_system_prompt.sql"
      - "internal/db/migrations/0004_add_scheduled_trigger.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "database/sql"
        emit_interface: false
        emit_json_tags: true
        emit_pointers_for_null_types: true
