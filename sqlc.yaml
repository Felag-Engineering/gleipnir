version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/db/queries"
    schema:
      - "internal/db/migrations/0001_initial.sql"
      - "internal/db/migrations/0011_add_system_and_model_settings.sql"
      - "internal/db/migrations/0012_add_openai_compat_providers.sql"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "database/sql"
        emit_interface: false
        emit_json_tags: true
        emit_pointers_for_null_types: true
