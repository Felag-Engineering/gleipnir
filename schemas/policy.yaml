# This file documents every field in the policy schema.
# Worked examples follow the field reference.
#
# Conventions:
#   required   — must be present, validator rejects if absent
#   optional   — may be omitted, default noted where applicable
#   multiline  — use YAML block scalar (|) for readability

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------

# name: string — required
#   Unique across all policies. Used in run list, notifications, and logs.
name: string

# description: string — optional
#   Human-readable summary of what this policy does.
description: string

# folder: string — optional, default: "Ungrouped"
#   Organizational grouping for the UI dashboard. Policies with the same
#   folder value are displayed together in a collapsible folder row.
#   Purely cosmetic — has no effect on trigger routing or runtime behaviour.
#   Stored in the YAML blob, not as a separate column.
folder: string


# ---------------------------------------------------------------------------
# Model (preferred format, introduced in issue #344)
# ---------------------------------------------------------------------------
#
# Specifies the LLM provider, model name, and provider-specific options for
# this policy. Omit this section entirely to use the defaults.

model:

  # provider: string — optional, default: "anthropic"
  #   The LLM provider to use for this policy.
  #   Currently supported: anthropic, claude-code
  provider: anthropic

  # name: string — optional, default: claude-sonnet-4-6
  #   The model the agent will use for this policy.
  #   Supported values depend on the chosen provider.
  #   For anthropic:
  #     claude-sonnet-4-6         — balanced capability and cost (default)
  #     claude-opus-4-6           — most capable, highest cost
  #     claude-sonnet-4-20250514  — dated alias for claude-sonnet-4-6
  #     claude-haiku-4-5-20251001 — fastest, lowest cost
  name: claude-sonnet-4-6

  # options: map — optional, default: empty
  #   Provider-specific options (e.g., enable_prompt_caching).
  #   Preserved as-is and validated downstream by the provider implementation.
  #   For claude-code:
  #     max_turns: int           — maximum conversational turns (maps to --max-turns)
  #     max_budget_usd: float    — maximum spend in USD (maps to --max-budget-usd)
  options:
    enable_prompt_caching: true


# ---------------------------------------------------------------------------
# Trigger
# ---------------------------------------------------------------------------
#
# Exactly one trigger block is required. The type field selects the trigger
# variant and determines which additional fields are valid.

trigger:

  # type: webhook | manual | scheduled — required
  type: webhook


  # --- webhook ---
  # No additional configuration. The webhook URL is derived from the policy
  # ID and surfaced in the policy detail view:
  #   POST /api/v1/webhooks/:policy_id
  # The request body (any JSON) becomes the trigger payload, delivered to
  # the agent as the first user message.


  # --- manual ---
  # No additional configuration. Triggered on demand from the dashboard.


  # --- scheduled ---
  # fire_at: list of strings — required for scheduled
  #   ISO-8601 UTC timestamps at which the policy should fire exactly once.
  #   The runtime pops each timestamp as it fires a run. When all timestamps
  #   are consumed the policy is automatically paused (paused_at is set).
  #   Example: ["2026-06-01T09:00:00Z", "2026-07-01T09:00:00Z"]
  fire_at:
    - "2026-06-01T09:00:00Z"


# ---------------------------------------------------------------------------
# Capabilities
# ---------------------------------------------------------------------------
#
# Defines the agent's capability envelope for this policy. Tools not listed
# here are not registered with the agent — they literally do not exist in
# its tool list (ADR-001).
#
# Tool references use dot notation: server_name.tool_name
#   - server_name: the name field of the registered MCP server
#   - tool_name:   the tool name as discovered from that server
#
# Validator behaviour:
#   At save time:  warn (non-blocking) if a tool reference has no match
#                  in the MCP registry
#   At run start:  fail fast (blocking) if a tool reference has no match

capabilities:

  # tools: list — required (at least one tool must be present)
  #   Tools the agent may call during a run. Any tool can optionally be
  #   approval-gated to require human authorization before execution.
  tools:
    - tool: server_name.tool_name

    # With approval gate:
    - tool: server_name.tool_name
      # approval: required | none — optional, default: none
      approval: required
      # timeout: duration — optional, only valid if approval: required
      #   How long to wait for a human decision before timing out.
      #   Go time.ParseDuration format.
      timeout: 30m
      # on_timeout: reject — optional, default: reject
      #   What to do if the approval window expires without a decision.
      #   Only "reject" is supported. "approve" was removed in issue #313
      #   because the background scanner could not honor it on crash recovery.
      on_timeout: reject


  # feedback: block — optional
  #   Enables the native feedback channel (gleipnir.ask_operator).
  #   When enabled, the agent can pause the run to consult a human operator.
  #   Omit entirely or set enabled: false to disable (default).
  feedback:
    # enabled: bool — required within feedback block
    #   When true, injects gleipnir.ask_operator into the agent's tool list.
    enabled: true
    # timeout: duration — optional, Go time.ParseDuration format (e.g. "30m", "1h")
    #   How long to wait for an operator response before taking the on_timeout action.
    #   Typed as a string for consistency with tool capability timeout fields.
    timeout: 30m
    # on_timeout: fail — optional, default: fail
    #   Action when the feedback timeout expires without a response.
    on_timeout: fail


# ---------------------------------------------------------------------------
# Agent
# ---------------------------------------------------------------------------

agent:

  # preamble: multiline string — optional
  #   Behavioral instructions for the agent. Operator-editable.
  #   If absent, the Gleipnir default BoundAgent preamble is used (ADR-012).
  #   The generated capabilities block (sensor/actuator/feedback tool lists)
  #   is appended after the preamble at run start — do not duplicate tool
  #   names here.
  preamble: |
    You are a BoundAgent — an autonomous agent operating within explicitly
    defined boundaries.

    You have two categories of capabilities:

    - Tools: your available tools for interacting with systems. Some tools
      may require human approval before execution — these are marked in your
      tool list.
    - Feedback: a channel to consult a human operator. Use this when you
      are uncertain about intended scope, when observations reveal something
      unexpected, or when proceeding would require an assumption you cannot
      verify.

    Your operating principles:
    1. Act deliberately. Gather information before making changes. Do not
       take additional actions because they seem useful.
    2. Ask when uncertain. A paused run that asks a good question is better
       than a completed run that made a wrong assumption.
    3. Be transparent. Your reasoning is fully audited. Explain what you
       observed, what you concluded, and why you acted.

  # task: multiline string — required
  #   Task-specific instructions for this policy. Describes what the agent
  #   should do, what success looks like, and any policy-specific constraints.
  #   The trigger payload (webhook body, cron metadata, poll filter result)
  #   is delivered as the first user message — reference it here as needed.
  task: |
    Describe what this agent should do, what success looks like,
    and any constraints specific to this policy.

  limits:
    # max_tokens_per_run: integer — optional, default: 20000
    #   Total token budget across the entire run (input + output).
    #   Run terminates with a failed state if exceeded.
    max_tokens_per_run: 20000

    # max_tool_calls_per_run: integer — optional, default: 50
    #   Maximum number of MCP tool calls across the entire run.
    #   Run terminates with a failed state if exceeded.
    max_tool_calls_per_run: 50

  # concurrency: skip | queue | parallel | replace — optional, default: skip
  #   Behaviour when a trigger fires while a run for this policy is active.
  #
  #   skip     — discard the new trigger (safest, default)
  #   queue    — queue the trigger, execute after the active run completes
  #   parallel — start a new run immediately, up to a configured limit
  #   replace  — cancel the active run, start fresh with the new trigger
  #              (not valid if any actuator has approval: required)
  concurrency: skip

  # queue_depth: integer — optional, default: 10
  #   Maximum number of trigger payloads to hold in the queue when
  #   concurrency is "queue". Triggers arriving when the queue is full
  #   are rejected with 429 Too Many Requests. Ignored for other modes.
  #   A value of 0 means "use default" (10).
  queue_depth: 10
