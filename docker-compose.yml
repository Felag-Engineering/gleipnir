services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GLEIPNIR_PORT:-3000}:8080"
    environment:
      - GLEIPNIR_DB_PATH=${GLEIPNIR_DB_PATH:-/data/gleipnir.db}
      - GLEIPNIR_ENCRYPTION_KEY=${GLEIPNIR_ENCRYPTION_KEY}
    volumes:
      - gleipnir_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  gleipnir_data:
