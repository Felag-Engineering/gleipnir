services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${GLEIPNIR_PORT:-3000}:8080"
    environment:
      - GLEIPNIR_DB_PATH=${GLEIPNIR_DB_PATH:-/data/gleipnir.db}
      - GLEIPNIR_LISTEN_ADDR=${GLEIPNIR_LISTEN_ADDR:-:8080}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GLEIPNIR_DEFAULT_PROVIDER=${GLEIPNIR_DEFAULT_PROVIDER:-}
      - GLEIPNIR_DEFAULT_MODEL=${GLEIPNIR_DEFAULT_MODEL:-}
    volumes:
      - gleipnir_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-test-server:
    build:
      context: ./mcp-test-server
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    restart: unless-stopped

  todoist-mcp:
    image: ghcr.io/naotama2002/todoist-go-mcp-server:latest
    command: ["--mode", "http", "--addr", ":8091"]
    ports:
      - "8091:8091"
    environment:
      - TODOIST_API_TOKEN=${TODOIST_API_TOKEN}
    profiles:
      - integrations
    restart: unless-stopped

  mealie-mcp:
    build:
      context: ./mcp-servers/mealie
      dockerfile: Dockerfile
    ports:
      - "8092:8092"
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
    profiles:
      - integrations
    restart: unless-stopped

volumes:
  gleipnir_data:
