services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GLEIPNIR_DB_PATH=/data/gleipnir.db
      - GLEIPNIR_LISTEN_ADDR=:8080
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - gleipnir_data:/data
    restart: unless-stopped

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  gleipnir_data:
