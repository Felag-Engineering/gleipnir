services:
  api:
    image: felagengineering/gleipnir:latest
    ports:
      - "${GLEIPNIR_PORT:-3000}:8080"
    environment:
      - GLEIPNIR_DB_PATH=${GLEIPNIR_DB_PATH:-/data/gleipnir.db}
      # REQUIRED. Encrypts provider API keys and webhook secrets at rest.
      # Losing this value makes all encrypted data permanently unrecoverable.
      # Back it up (password manager / secrets vault). Rotation not supported in v1.0.
      # Generate with: openssl rand -hex 32
      - GLEIPNIR_ENCRYPTION_KEY=${GLEIPNIR_ENCRYPTION_KEY:?GLEIPNIR_ENCRYPTION_KEY must be set. Copy .env.example to .env and fill it in (openssl rand -hex 32).}
    volumes:
      - gleipnir_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  gleipnir_data:
