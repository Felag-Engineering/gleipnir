services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - GLEIPNIR_DB_PATH=${GLEIPNIR_DB_PATH:-/data/gleipnir.db}
      - GLEIPNIR_LISTEN_ADDR=${GLEIPNIR_LISTEN_ADDR:-:8080}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - gleipnir_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${GLEIPNIR_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  gleipnir_data:
