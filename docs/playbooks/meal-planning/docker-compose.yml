# MCP servers for the meal-planning playbook.
#
# Run from this directory:
#   docker compose up -d
#
# Google Calendar is reached through Composio's hosted MCP — no local
# fetch-mcp container is needed for it (see README.md § Step 1). This file
# only runs Mealie, which is a local homelab service with no Composio
# equivalent.
#
# Secrets are loaded from .env in this directory (see README.md § Step 3).

services:

  # Mealie MCP server — reads recipes and creates meal plans.
  # Repo: https://github.com/that0n3guy/mealie-mcp-server-ts
  mealie-mcp:
    image: node:22-alpine
    command: >
      npx -y supergateway
      --port 8102
      --stdio "npx -y mealie-mcp-server-ts"
    ports:
      - "8102:8102"
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
    restart: unless-stopped
