# Mealie MCP server for the meal-planning playbook.
#
# Calendar access goes through the Arcade gateway, which is registered in
# Gleipnir's UI (not via this compose file). See the Arcade playbook for setup.
#
# Run from this directory:
#   docker compose up -d
#
# Secrets are loaded from .env in this directory (see README.md § Step 2).

services:

  # Mealie MCP server — reads recipes and creates meal plans.
  # Repo: https://github.com/that0n3guy/mealie-mcp-server-ts
  mealie-mcp:
    image: node:22-alpine
    command: >
      npx -y supergateway
      --port 8102
      --outputTransport streamableHttp
      --stdio "npx -y mealie-mcp-server-ts"
    ports:
      - "8102:8102"
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
    restart: unless-stopped
