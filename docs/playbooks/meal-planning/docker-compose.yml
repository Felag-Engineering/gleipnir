# MCP servers for the meal-planning playbook.
#
# Run from this directory:
#   docker compose up -d
#
# Secrets are loaded from .env in this directory (see README.md § Step 2).

services:

  # Fetch MCP server — fetches arbitrary URLs (used to read the Google Calendar ICS feed).
  # Repo: https://github.com/modelcontextprotocol/servers/tree/main/src/fetch
  fetch-mcp:
    image: node:22-alpine
    command: >
      npx -y supergateway
      --port 8101
      --stdio "npx -y @modelcontextprotocol/server-fetch"
    ports:
      - "8101:8101"
    restart: unless-stopped

  # Mealie MCP server — reads recipes and creates meal plans.
  # Repo: https://github.com/that0n3guy/mealie-mcp-server-ts
  mealie-mcp:
    image: node:22-alpine
    command: >
      npx -y supergateway
      --port 8102
      --stdio "npx -y mealie-mcp-server-ts"
    ports:
      - "8102:8102"
    environment:
      - MEALIE_BASE_URL=${MEALIE_BASE_URL}
      - MEALIE_API_KEY=${MEALIE_API_KEY}
    restart: unless-stopped
